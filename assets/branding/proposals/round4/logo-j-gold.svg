<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="haloJ" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#F5E4B3" stop-opacity="0.45"/>
      <stop offset="40%"  stop-color="#C9A84C" stop-opacity="0.18"/>
      <stop offset="80%"  stop-color="#C9A84C" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#060D1B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="irisJ" cx="50%" cy="40%" r="55%">
      <stop offset="0%"   stop-color="#FFF6D6"/>
      <stop offset="55%"  stop-color="#F0D080"/>
      <stop offset="100%" stop-color="#9C7A2C"/>
    </radialGradient>
    <radialGradient id="irisGlowJ">
      <stop offset="0%"   stop-color="#F5E4B3" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldJ" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#F5E4B3"/>
      <stop offset="50%"  stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#F0D080"/>
    </linearGradient>
  </defs>

  <!-- Halo aura -->
  <circle cx="100" cy="100" r="94" fill="url(#haloJ)"/>

  <!-- Pétalos de loto (3) emergiendo desde abajo del ojo -->
  <g transform="rotate(-30 100 142)">
    <path d="M 100,142 C 94,150 94,160 100,166 C 106,160 106,150 100,142 Z"
          fill="none" stroke="url(#goldJ)" stroke-width="1.4" stroke-linejoin="round" opacity="0.82"/>
  </g>
  <g transform="rotate(30 100 142)">
    <path d="M 100,142 C 94,150 94,160 100,166 C 106,150 106,150 100,142 Z"
          fill="none" stroke="url(#goldJ)" stroke-width="1.4" stroke-linejoin="round" opacity="0.82"/>
  </g>
  <!-- Central petal — más alto, peso visual -->
  <path d="M 100,140 C 92,150 92,164 100,172 C 108,164 108,150 100,140 Z"
        fill="none" stroke="url(#goldJ)" stroke-width="1.7" stroke-linejoin="round"/>

  <!-- Lágrima de Horus: línea curva descendente desde el bottom del ojo -->
  <path d="M 100,113 C 100,123 98,132 92,137 C 89,138 87,136 88,133"
        fill="none" stroke="url(#goldJ)" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Ojo · arco superior (ceja, más grueso) -->
  <path d="M 50,95 C 65,71 135,71 150,95"
        fill="none" stroke="url(#goldJ)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Ojo · arco inferior (más fino) -->
  <path d="M 50,95 C 65,113 135,113 150,95"
        fill="none" stroke="url(#goldJ)" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Iris glow -->
  <circle cx="100" cy="95" r="24" fill="url(#irisGlowJ)"/>
  <!-- Iris dorado luminoso -->
  <circle cx="100" cy="95" r="14" fill="url(#irisJ)"/>
  <!-- Pupila navy (alma adentro) -->
  <circle cx="100" cy="95" r="4.2" fill="#060D1B"/>
  <!-- Reflejo de vida -->
  <circle cx="97.2" cy="92.2" r="1.2" fill="#FFF6D6" opacity="0.9"/>
</svg>
