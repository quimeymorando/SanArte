<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="haloK" cx="50%" cy="50%" r="52%">
      <stop offset="0%"   stop-color="#F5E4B3" stop-opacity="0.55"/>
      <stop offset="35%"  stop-color="#C9A84C" stop-opacity="0.22"/>
      <stop offset="75%"  stop-color="#C9A84C" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#060D1B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="irisK" cx="50%" cy="40%" r="55%">
      <stop offset="0%"   stop-color="#FFF6D6"/>
      <stop offset="55%"  stop-color="#F0D080"/>
      <stop offset="100%" stop-color="#9C7A2C"/>
    </radialGradient>
    <radialGradient id="irisGlowK">
      <stop offset="0%"   stop-color="#F5E4B3" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldK" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#F5E4B3"/>
      <stop offset="50%"  stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#F0D080"/>
    </linearGradient>
    <linearGradient id="rayK" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%"   stop-color="#F5E4B3" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Halo aura más intenso -->
  <circle cx="100" cy="100" r="96" fill="url(#haloK)"/>

  <!-- 7 rayos solares en hemisferio superior (entre el ojo y el ajna) -->
  <g stroke="url(#rayK)" stroke-width="0.9" stroke-linecap="round" opacity="0.7">
    <line x1="100" y1="65" x2="100" y2="38"/>
    <g transform="rotate(-25 100 95)"><line x1="100" y1="65" x2="100" y2="42"/></g>
    <g transform="rotate(25 100 95)"><line x1="100" y1="65" x2="100" y2="42"/></g>
    <g transform="rotate(-50 100 95)"><line x1="100" y1="65" x2="100" y2="48"/></g>
    <g transform="rotate(50 100 95)"><line x1="100" y1="65" x2="100" y2="48"/></g>
    <g transform="rotate(-75 100 95)"><line x1="100" y1="65" x2="100" y2="55"/></g>
    <g transform="rotate(75 100 95)"><line x1="100" y1="65" x2="100" y2="55"/></g>
  </g>

  <!-- Punto Ajna (chakra del tercer ojo en la frente) -->
  <circle cx="100" cy="22" r="2.6" fill="url(#goldK)"/>

  <!-- 5 pétalos de loto -->
  <!-- Laterales más alejados (cortos) -->
  <g transform="rotate(-58 100 142)">
    <path d="M 100,142 C 95,148 95,156 100,160 C 105,156 105,148 100,142 Z"
          fill="none" stroke="url(#goldK)" stroke-width="1.2" stroke-linejoin="round" opacity="0.65"/>
  </g>
  <g transform="rotate(58 100 142)">
    <path d="M 100,142 C 95,148 95,156 100,160 C 105,148 105,148 100,142 Z"
          fill="none" stroke="url(#goldK)" stroke-width="1.2" stroke-linejoin="round" opacity="0.65"/>
  </g>
  <!-- Laterales medios -->
  <g transform="rotate(-30 100 142)">
    <path d="M 100,142 C 94,150 94,160 100,166 C 106,160 106,150 100,142 Z"
          fill="none" stroke="url(#goldK)" stroke-width="1.4" stroke-linejoin="round" opacity="0.85"/>
  </g>
  <g transform="rotate(30 100 142)">
    <path d="M 100,142 C 94,150 94,160 100,166 C 106,150 106,150 100,142 Z"
          fill="none" stroke="url(#goldK)" stroke-width="1.4" stroke-linejoin="round" opacity="0.85"/>
  </g>
  <!-- Central, más alto -->
  <path d="M 100,140 C 92,150 92,164 100,172 C 108,164 108,150 100,140 Z"
        fill="none" stroke="url(#goldK)" stroke-width="1.7" stroke-linejoin="round"/>

  <!-- Lágrima de Horus -->
  <path d="M 100,113 C 100,123 98,132 92,137 C 89,138 87,136 88,133"
        fill="none" stroke="url(#goldK)" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Ojo · arco superior (ceja, peso) -->
  <path d="M 50,95 C 65,71 135,71 150,95"
        fill="none" stroke="url(#goldK)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Arco inferior (más fino) -->
  <path d="M 50,95 C 65,113 135,113 150,95"
        fill="none" stroke="url(#goldK)" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Iris glow + iris + pupila -->
  <circle cx="100" cy="95" r="24" fill="url(#irisGlowK)"/>
  <circle cx="100" cy="95" r="14" fill="url(#irisK)"/>
  <circle cx="100" cy="95" r="4.2" fill="#060D1B"/>
  <circle cx="97.2" cy="92.2" r="1.2" fill="#FFF6D6" opacity="0.9"/>
</svg>
