<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="haloL1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#F5E4B3" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="haloL2" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#C9A84C" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#C9A84C" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="haloL3" cx="50%" cy="50%" r="60%">
      <stop offset="0%"   stop-color="#F5E4B3" stop-opacity="0"/>
      <stop offset="65%"  stop-color="#F5E4B3" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#060D1B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="irisL" cx="50%" cy="40%" r="55%">
      <stop offset="0%"   stop-color="#FFF6D6"/>
      <stop offset="55%"  stop-color="#F0D080"/>
      <stop offset="100%" stop-color="#9C7A2C"/>
    </radialGradient>
    <radialGradient id="irisGlowL">
      <stop offset="0%"   stop-color="#F5E4B3" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldL" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#F5E4B3"/>
      <stop offset="50%"  stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#F0D080"/>
    </linearGradient>
    <linearGradient id="rayL" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%"   stop-color="#F5E4B3" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Halo en 4 capas -->
  <circle cx="100" cy="100" r="98" fill="url(#haloL3)"/>
  <circle cx="100" cy="100" r="92" fill="url(#haloL2)"/>
  <circle cx="100" cy="100" r="78" fill="url(#haloL1)"/>

  <!-- Mandala perimetral: círculo + 6 puntos equidistantes -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="url(#goldL)" stroke-width="0.5" opacity="0.4"/>
  <g fill="url(#goldL)" opacity="0.7">
    <circle cx="100" cy="8"   r="1.4"/>
    <circle cx="180" cy="54"  r="1.4"/>
    <circle cx="180" cy="146" r="1.4"/>
    <circle cx="100" cy="192" r="1.4"/>
    <circle cx="20"  cy="146" r="1.4"/>
    <circle cx="20"  cy="54"  r="1.4"/>
  </g>

  <!-- 12 rayos solares alternando largos/cortos en hemisferio superior+lateral -->
  <g stroke="url(#rayL)" stroke-linecap="round">
    <!-- 6 largos -->
    <g stroke-width="1.0" opacity="0.7">
      <line x1="100" y1="65" x2="100" y2="32"/>
      <g transform="rotate(-30 100 95)"><line x1="100" y1="65" x2="100" y2="36"/></g>
      <g transform="rotate(30 100 95)"><line x1="100" y1="65" x2="100" y2="36"/></g>
      <g transform="rotate(-90 100 95)"><line x1="100" y1="65" x2="100" y2="42"/></g>
      <g transform="rotate(90 100 95)"><line x1="100" y1="65" x2="100" y2="42"/></g>
      <g transform="rotate(-60 100 95)"><line x1="100" y1="65" x2="100" y2="42"/></g>
    </g>
    <!-- 6 cortos -->
    <g stroke-width="0.7" opacity="0.45">
      <g transform="rotate(60 100 95)"><line x1="100" y1="65" x2="100" y2="50"/></g>
      <g transform="rotate(-15 100 95)"><line x1="100" y1="65" x2="100" y2="55"/></g>
      <g transform="rotate(15 100 95)"><line x1="100" y1="65" x2="100" y2="55"/></g>
      <g transform="rotate(-45 100 95)"><line x1="100" y1="65" x2="100" y2="50"/></g>
      <g transform="rotate(45 100 95)"><line x1="100" y1="65" x2="100" y2="50"/></g>
      <g transform="rotate(-75 100 95)"><line x1="100" y1="65" x2="100" y2="55"/></g>
    </g>
  </g>

  <!-- Línea vertical sutil del Ajna al ojo (conexión energética) -->
  <line x1="100" y1="26" x2="100" y2="68" stroke="url(#goldL)" stroke-width="0.5" opacity="0.35" stroke-linecap="round" stroke-dasharray="1.5,2"/>

  <!-- Punto Ajna -->
  <circle cx="100" cy="22" r="2.8" fill="url(#goldL)"/>

  <!-- 2 cejas sagradas (arcos protectores arriba) -->
  <path d="M 60,52 C 75,46 90,46 100,50" fill="none" stroke="url(#goldL)" stroke-width="0.7" stroke-linecap="round" opacity="0.5"/>
  <path d="M 100,50 C 110,46 125,46 140,52" fill="none" stroke="url(#goldL)" stroke-width="0.7" stroke-linecap="round" opacity="0.5"/>

  <!-- 7 pétalos de loto -->
  <g transform="rotate(-72 100 142)">
    <path d="M 100,142 C 95.5,148 95.5,156 100,159 C 104.5,156 104.5,148 100,142 Z"
          fill="none" stroke="url(#goldL)" stroke-width="1.1" stroke-linejoin="round" opacity="0.55"/>
  </g>
  <g transform="rotate(72 100 142)">
    <path d="M 100,142 C 95.5,148 95.5,156 100,159 C 104.5,148 104.5,148 100,142 Z"
          fill="none" stroke="url(#goldL)" stroke-width="1.1" stroke-linejoin="round" opacity="0.55"/>
  </g>
  <g transform="rotate(-48 100 142)">
    <path d="M 100,142 C 95,148 95,158 100,162 C 105,158 105,148 100,142 Z"
          fill="none" stroke="url(#goldL)" stroke-width="1.3" stroke-linejoin="round" opacity="0.7"/>
  </g>
  <g transform="rotate(48 100 142)">
    <path d="M 100,142 C 95,148 95,158 100,162 C 105,148 105,148 100,142 Z"
          fill="none" stroke="url(#goldL)" stroke-width="1.3" stroke-linejoin="round" opacity="0.7"/>
  </g>
  <g transform="rotate(-24 100 142)">
    <path d="M 100,142 C 94,150 94,162 100,168 C 106,162 106,150 100,142 Z"
          fill="none" stroke="url(#goldL)" stroke-width="1.5" stroke-linejoin="round" opacity="0.88"/>
  </g>
  <g transform="rotate(24 100 142)">
    <path d="M 100,142 C 94,150 94,162 100,168 C 106,150 106,150 100,142 Z"
          fill="none" stroke="url(#goldL)" stroke-width="1.5" stroke-linejoin="round" opacity="0.88"/>
  </g>
  <!-- Central, peso máximo -->
  <path d="M 100,140 C 91,150 91,166 100,174 C 109,166 109,150 100,140 Z"
        fill="none" stroke="url(#goldL)" stroke-width="1.8" stroke-linejoin="round"/>

  <!-- Lágrima de Horus -->
  <path d="M 100,113 C 100,123 98,132 92,137 C 89,138 87,136 88,133"
        fill="none" stroke="url(#goldL)" stroke-width="1.9" stroke-linecap="round"/>

  <!-- Ojo · arco superior (peso) -->
  <path d="M 50,95 C 65,71 135,71 150,95"
        fill="none" stroke="url(#goldL)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Arco inferior (más fino) -->
  <path d="M 50,95 C 65,113 135,113 150,95"
        fill="none" stroke="url(#goldL)" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Iris glow + iris + pupila + reflejo -->
  <circle cx="100" cy="95" r="26" fill="url(#irisGlowL)"/>
  <circle cx="100" cy="95" r="14" fill="url(#irisL)"/>
  <circle cx="100" cy="95" r="4.2" fill="#060D1B"/>
  <circle cx="97.2" cy="92.2" r="1.2" fill="#FFF6D6" opacity="0.9"/>
</svg>
