<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="haloH" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#F5E4B3" stop-opacity="0.50"/>
      <stop offset="35%"  stop-color="#C9A84C" stop-opacity="0.22"/>
      <stop offset="75%"  stop-color="#C9A84C" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#060D1B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldH" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#F5E4B3"/>
      <stop offset="50%"  stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#F0D080"/>
    </linearGradient>
    <radialGradient id="centerGlowH">
      <stop offset="0%"   stop-color="#FFFCEC" stop-opacity="1"/>
      <stop offset="35%"  stop-color="#F5E4B3" stop-opacity="0.7"/>
      <stop offset="80%"  stop-color="#C9A84C" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Halo amplio cósmico -->
  <circle cx="100" cy="100" r="98" fill="url(#haloH)"/>

  <!-- Estrellas dispersas (universo alrededor) -->
  <g fill="url(#goldH)">
    <circle cx="32"  cy="38"  r="0.9"/>
    <circle cx="172" cy="56"  r="0.7"/>
    <circle cx="160" cy="158" r="1"/>
    <circle cx="38"  cy="162" r="0.7"/>
    <circle cx="184" cy="100" r="0.8"/>
    <circle cx="18"  cy="100" r="0.7"/>
    <circle cx="50"  cy="22"  r="0.5"/>
    <circle cx="148" cy="180" r="0.5"/>
  </g>

  <!-- 12 rayos alternando largos / cortos -->
  <g stroke="url(#goldH)" stroke-linecap="round">
    <!-- 6 largos (verticales y inter) -->
    <g stroke-width="1.3" opacity="0.7">
      <line x1="100" y1="20"  x2="100" y2="6"/>
      <line x1="100" y1="180" x2="100" y2="194"/>
      <line x1="74"  y1="35"  x2="64"  y2="20"/>
      <line x1="126" y1="35"  x2="136" y2="20"/>
      <line x1="74"  y1="165" x2="64"  y2="180"/>
      <line x1="126" y1="165" x2="136" y2="180"/>
    </g>
    <!-- 6 cortos -->
    <g stroke-width="0.8" opacity="0.4">
      <line x1="60"  y1="60"  x2="50"  y2="50"/>
      <line x1="140" y1="60"  x2="150" y2="50"/>
      <line x1="60"  y1="140" x2="50"  y2="150"/>
      <line x1="140" y1="140" x2="150" y2="150"/>
      <line x1="48"  y1="100" x2="34"  y2="100"/>
      <line x1="152" y1="100" x2="166" y2="100"/>
    </g>
  </g>

  <!-- Vesica alargada vertical -->
  <path d="M 100,25 C 132,55 132,145 100,175 C 68,145 68,55 100,25 Z"
        fill="none" stroke="url(#goldH)" stroke-width="1.9" stroke-linecap="round"/>

  <!-- 3 anillos concéntricos: planeta con anillos vista de frente -->
  <circle cx="100" cy="100" r="28" fill="none" stroke="url(#goldH)" stroke-width="0.9" opacity="0.7"/>
  <circle cx="100" cy="100" r="20" fill="none" stroke="url(#goldH)" stroke-width="0.7" opacity="0.55"/>
  <circle cx="100" cy="100" r="13" fill="none" stroke="url(#goldH)" stroke-width="0.6" opacity="0.45"/>

  <!-- Glow central intenso -->
  <circle cx="100" cy="100" r="11" fill="url(#centerGlowH)"/>

  <!-- Centro luminoso pleno -->
  <circle cx="100" cy="100" r="3.2" fill="#FFFCEC"/>
</svg>
