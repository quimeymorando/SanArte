<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="goldB" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#F5E4B3"/>
      <stop offset="60%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#F0D080"/>
    </linearGradient>
  </defs>
  <!-- Outer flame/drop outline -->
  <path d="M50,10 C70,30 76,54 50,86 C24,54 30,30 50,10 Z"
        fill="none" stroke="url(#goldB)" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- Inner nascent lotus: 3 stylized petals rising -->
  <g fill="none" stroke="url(#goldB)" stroke-width="1.5" stroke-linecap="round">
    <!-- center petal -->
    <path d="M50,74 C50,60 50,46 50,32"/>
    <!-- left petal -->
    <path d="M50,74 C40,62 36,50 40,38"/>
    <!-- right petal -->
    <path d="M50,74 C60,62 64,50 60,38"/>
    <!-- petal tips (subtle leaves) -->
    <path d="M50,32 C48,30 47,29 46,28"/>
    <path d="M50,32 C52,30 53,29 54,28"/>
    <path d="M40,38 C38,36 37,35 36,34"/>
    <path d="M60,38 C62,36 63,35 64,34"/>
  </g>
  <!-- Base origin dot -->
  <circle cx="50" cy="76" r="2.2" fill="url(#goldB)"/>
</svg>
