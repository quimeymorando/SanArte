<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="goldC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E4B3"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#F0D080"/>
    </linearGradient>
  </defs>
  <g fill="none" stroke="url(#goldC)" stroke-linecap="round">
    <!-- Outer ring -->
    <circle cx="50" cy="50" r="44" stroke-width="1.4"/>
    <!-- Inner ring -->
    <circle cx="50" cy="50" r="22" stroke-width="0.9"/>
    <!-- 8 short radials between rings -->
    <g stroke-width="1.2">
      <line x1="50" y1="6"  x2="50" y2="28"/>
      <line x1="50" y1="72" x2="50" y2="94"/>
      <line x1="6"  y1="50" x2="28" y2="50"/>
      <line x1="72" y1="50" x2="94" y2="50"/>
    </g>
    <g stroke-width="1.2" transform="rotate(45 50 50)">
      <line x1="50" y1="6"  x2="50" y2="28"/>
      <line x1="50" y1="72" x2="50" y2="94"/>
      <line x1="6"  y1="50" x2="28" y2="50"/>
      <line x1="72" y1="50" x2="94" y2="50"/>
    </g>
  </g>
  <!-- Cardinal dots at outer tips -->
  <g fill="url(#goldC)">
    <circle cx="50" cy="4"  r="1.7"/>
    <circle cx="50" cy="96" r="1.7"/>
    <circle cx="4"  cy="50" r="1.7"/>
    <circle cx="96" cy="50" r="1.7"/>
    <circle cx="18.97" cy="18.97" r="1.4"/>
    <circle cx="81.03" cy="18.97" r="1.4"/>
    <circle cx="18.97" cy="81.03" r="1.4"/>
    <circle cx="81.03" cy="81.03" r="1.4"/>
  </g>
  <!-- Subtle stylized "S" at center -->
  <path d="M 56,40 C 47,38 44,46 50,49 C 56,52 53,60 44,58"
        fill="none" stroke="url(#goldC)" stroke-width="1.7" stroke-linecap="round"/>
</svg>
