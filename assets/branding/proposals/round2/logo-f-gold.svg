<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="haloF" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#F5E4B3" stop-opacity="0.5"/>
      <stop offset="30%"  stop-color="#C9A84C" stop-opacity="0.22"/>
      <stop offset="75%"  stop-color="#C9A84C" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#060D1B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldF" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#F5E4B3"/>
      <stop offset="50%"  stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#F0D080"/>
    </linearGradient>
    <radialGradient id="coreGlowF">
      <stop offset="0%"   stop-color="#FFF6D6" stop-opacity="1"/>
      <stop offset="40%"  stop-color="#F5E4B3" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreF" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#FFFCEC"/>
      <stop offset="55%"  stop-color="#F0D080"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </radialGradient>
  </defs>

  <!-- Halo aura -->
  <circle cx="100" cy="100" r="92" fill="url(#haloF)"/>

  <!-- Vesica piscis vertical: dos arcos que forman un ojo -->
  <!-- Arco izquierdo (más fino, asimetría sutil) -->
  <path d="M 100,38 C 64,70 64,130 100,162"
        fill="none" stroke="url(#goldF)" stroke-width="1.6" stroke-linecap="round" opacity="0.95"/>
  <!-- Arco derecho (un punto más grueso — asimetría sagrada) -->
  <path d="M 100,38 C 136,70 136,130 100,162"
        fill="none" stroke="url(#goldF)" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Iris: curva sutil dentro del ojo -->
  <path d="M 78,100 C 88,92 112,92 122,100"
        fill="none" stroke="url(#goldF)" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>

  <!-- Rayos sutiles desde el centro -->
  <g stroke="url(#goldF)" stroke-width="0.6" stroke-linecap="round" opacity="0.35">
    <line x1="100" y1="78"  x2="100" y2="64"/>
    <line x1="100" y1="122" x2="100" y2="138"/>
    <line x1="76"  y1="100" x2="62"  y2="100"/>
    <line x1="124" y1="100" x2="138" y2="100"/>
    <line x1="83"  y1="83"  x2="74"  y2="74"/>
    <line x1="117" y1="117" x2="126" y2="126"/>
  </g>

  <!-- Glow del centro -->
  <circle cx="100" cy="100" r="18" fill="url(#coreGlowF)"/>
  <!-- Punto centro pleno — pupila iluminada -->
  <circle cx="100" cy="100" r="5" fill="url(#coreF)"/>
</svg>
