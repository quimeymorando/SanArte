<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="haloE" cx="50%" cy="62%" r="55%">
      <stop offset="0%"   stop-color="#F5E4B3" stop-opacity="0.45"/>
      <stop offset="35%"  stop-color="#C9A84C" stop-opacity="0.20"/>
      <stop offset="80%"  stop-color="#C9A84C" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#060D1B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="petalCenterE" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%"  stop-color="#C9A84C" stop-opacity="1"/>
      <stop offset="60%" stop-color="#F0D080" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#F5E4B3" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="petalSideE" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%"  stop-color="#C9A84C" stop-opacity="0.85"/>
      <stop offset="70%" stop-color="#F0D080" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#F5E4B3" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="baseLineE" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%"   stop-color="#C9A84C" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#F5E4B3" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="coreGlowE">
      <stop offset="0%"   stop-color="#FFF6D6" stop-opacity="0.85"/>
      <stop offset="50%"  stop-color="#F0D080" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreE" cx="50%" cy="40%" r="60%">
      <stop offset="0%"   stop-color="#FFF6D6"/>
      <stop offset="60%"  stop-color="#F0D080"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </radialGradient>
  </defs>

  <!-- Aura -->
  <circle cx="100" cy="125" r="95" fill="url(#haloE)"/>

  <!-- Pétalos: emergen de (100, 130) -->
  <!-- Pétalo izquierdo -->
  <path d="M 100,130 C 76,108 64,82 70,55 C 80,75 92,100 100,130 Z"
        fill="url(#petalSideE)" stroke="url(#petalSideE)" stroke-width="0.6" opacity="0.95"/>
  <!-- Pétalo derecho -->
  <path d="M 100,130 C 124,108 136,82 130,55 C 120,75 108,100 100,130 Z"
        fill="url(#petalSideE)" stroke="url(#petalSideE)" stroke-width="0.6" opacity="0.95"/>
  <!-- Pétalo central — más alto y un punto más grueso (asimetría sagrada) -->
  <path d="M 100,130 C 88,98 88,68 100,38 C 112,68 112,98 100,130 Z"
        fill="url(#petalCenterE)" stroke="url(#petalCenterE)" stroke-width="0.8"/>

  <!-- Base — línea horizontal de luz -->
  <line x1="58" y1="130" x2="142" y2="130" stroke="url(#baseLineE)" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Glow del centro -->
  <circle cx="100" cy="130" r="14" fill="url(#coreGlowE)"/>
  <!-- Centro pleno — el alma del loto -->
  <circle cx="100" cy="130" r="4.2" fill="url(#coreE)"/>
</svg>
